<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — Chuks Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="card">
        <div class="auth-logo">
          <div class="auth-logo-icon">🍽️</div>
          <div class="auth-logo-title">Chuks Kitchen</div>
          <div class="auth-logo-sub">Create your account to start ordering</div>
        </div>

        <form id="register-form" style="display:flex;flex-direction:column;gap:1rem">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input class="form-input" type="text" id="name" placeholder="John Doe" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div style="position:relative">
              <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" required style="padding-right:2.75rem"/>
              <button type="button" id="toggle-pw" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:0.8rem;margin-top:0.25rem" id="submit-btn">
            Create Account
          </button>
        </form>

        <div class="auth-divider"><span>Already have an account?</span></div>
        <a href="/pages/login.html" class="btn btn-outline" style="width:100%;padding:0.75rem">Sign In</a>
      </div>
    </div>
  </div>

  <!-- OTP Modal -->
  <div class="modal-overlay" id="otp-modal">
    <div class="modal" style="text-align:center">
      <div style="font-size:2.5rem;margin-bottom:0.75rem">📩</div>
      <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:0.4rem">Verify Your Email</h2>
      <p style="color:var(--muted);font-size:0.875rem;margin-bottom:1.5rem">Enter the 6-digit OTP sent to your email address</p>
      <div class="otp-inputs" id="otp-inputs">
        <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      </div>
      <button class="btn btn-primary" style="width:100%;padding:0.8rem;margin-top:1.5rem" id="verify-btn">Verify OTP</button>
      <p style="font-size:0.8rem;color:var(--muted);margin-top:1rem">Didn't receive it? Check your spam or <button id="resend-btn" style="background:none;border:none;color:var(--brand);font-weight:600;cursor:pointer;font-size:0.8rem">resend</button></p>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script type="module">
    import { apiFetch, showToast, setLoading } from '/js/api.js';

    let registeredEmail = '';

    // Password toggle
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    // OTP digit auto-advance
    const digits = document.querySelectorAll('.otp-digit');
    digits.forEach((d, i) => {
      d.addEventListener('input', () => { if (d.value && i < digits.length - 1) digits[i+1].focus(); });
      d.addEventListener('keydown', e => { if (e.key === 'Backspace' && !d.value && i > 0) digits[i-1].focus(); });
      d.addEventListener('paste', e => {
        const text = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
        digits.forEach((dd, ii) => { dd.value = text[ii] || ''; });
        e.preventDefault();
      });
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      setLoading(btn, true);
      try {
        const res = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ name: document.getElementById('name').value, email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        registeredEmail = document.getElementById('email').value;
        showToast(`OTP: ${res.otp}`, 'info');
        document.getElementById('otp-modal').classList.add('open');
        digits[0].focus();
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    });

    document.getElementById('verify-btn').addEventListener('click', async () => {
      const code = [...digits].map(d => d.value).join('');
      if (code.length < 6) { showToast('Enter all 6 digits', 'error'); return; }
      const btn = document.getElementById('verify-btn');
      setLoading(btn, true);
      try {
        await apiFetch('/auth/verify-otp', { method: 'POST', body: JSON.stringify({ email: registeredEmail, code }) });
        showToast('Account verified! Redirecting...');
        setTimeout(() => location.href = '/pages/login.html', 1200);
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
