<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Chuks Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="card">
        <div class="auth-logo">
          <div class="auth-logo-icon">🍽️</div>
          <div class="auth-logo-title">Welcome Back</div>
          <div class="auth-logo-sub">Sign in to your Chuks Kitchen account</div>
        </div>

        <form id="login-form" style="display:flex;flex-direction:column;gap:1rem">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div style="position:relative">
              <input class="form-input" type="password" id="password" placeholder="Your password" required style="padding-right:2.75rem"/>
              <button type="button" id="toggle-pw" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:0.8rem;margin-top:0.25rem" id="submit-btn">
            Sign In
          </button>
        </form>

        <div class="auth-divider"><span>Don't have an account?</span></div>
        <a href="/pages/register.html" class="btn btn-outline" style="width:100%;padding:0.75rem">Create Account</a>
      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script type="module">
    import { apiFetch, setToken, showToast, setLoading, isLoggedIn } from '/js/api.js';
    if (isLoggedIn()) location.href = '/pages/menu.html';

    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      setLoading(btn, true);
      try {
        const res = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        setToken(res.access_token);
        showToast('Welcome back! 🎉');
        setTimeout(() => location.href = '/pages/menu.html', 900);
      } catch (err) {
        showToast(err.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
