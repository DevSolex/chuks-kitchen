<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — Chuks Kitchen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <div id="navbar-mount"></div>

  <div class="page-header">
    <div class="page-header-inner">
      <h1 style="font-size:1.75rem;font-weight:800;letter-spacing:-0.02em">My Orders</h1>
      <p style="color:var(--muted);margin-top:0.25rem">Track and review all your past orders</p>
    </div>
  </div>

  <div class="section" style="max-width:860px">
    <div id="orders-list" style="display:flex;flex-direction:column;gap:1.25rem"></div>
    <div class="empty-state hidden" id="empty-state">
      <div class="empty-state-icon">📦</div>
      <div class="empty-state-title">No orders yet</div>
      <div class="empty-state-desc">Your order history will appear here</div>
      <a href="/pages/menu.html" class="btn btn-primary">Browse Menu</a>
    </div>
  </div>

  <!-- Order detail modal -->
  <div class="modal-overlay" id="order-modal">
    <div class="modal" style="max-width:520px;width:100%">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
        <h3 style="font-weight:800;font-size:1.1rem" id="modal-title">Order Details</h3>
        <button class="btn btn-ghost btn-icon" id="close-modal">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module">
    import { apiFetch, showToast, formatPrice, formatDate, isLoggedIn, injectNavbar } from '/js/api.js';
    if (!isLoggedIn()) location.href = '/pages/login.html';
    injectNavbar('orders');

    const statusConfig = {
      pending:   { badge: 'badge-orange', label: 'Pending',   icon: '⏳', steps: [1,0,0,0] },
      confirmed: { badge: 'badge-blue',   label: 'Confirmed', icon: '✅', steps: [1,1,0,0] },
      preparing: { badge: 'badge-blue',   label: 'Preparing', icon: '👨‍🍳', steps: [1,1,1,0] },
      completed: { badge: 'badge-green',  label: 'Completed', icon: '🎉', steps: [1,1,1,1] },
      cancelled: { badge: 'badge-red',    label: 'Cancelled', icon: '✕',  steps: [0,0,0,0] },
    };

    const stepLabels = ['Order Placed', 'Confirmed', 'Preparing', 'Delivered'];

    function buildTimeline(steps) {
      return `<div class="timeline">${stepLabels.map((label, i) => {
        const state = steps[i] === 1 ? (i < steps.filter(Boolean).length - 1 ? 'done' : 'active') : 'pending';
        return `<div class="timeline-item">
          <div class="timeline-dot ${state}">${state === 'done' ? '✓' : i+1}</div>
          <div class="timeline-content">
            <div class="timeline-label" style="color:${state==='pending'?'var(--muted)':'var(--text)'}">${label}</div>
          </div>
        </div>`;
      }).join('')}</div>`;
    }

    async function loadOrders() {
      try {
        const orders = await apiFetch('/orders/');
        const list = document.getElementById('orders-list');
        if (!orders.length) { document.getElementById('empty-state').classList.remove('hidden'); return; }

        list.innerHTML = orders.map(o => {
          const cfg = statusConfig[o.status] || statusConfig.pending;
          return `
            <div class="card" style="padding:1.5rem;cursor:pointer" data-id="${o.id}">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
                <div>
                  <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.3rem">
                    <span style="font-weight:800;font-size:1rem">Order #${o.id}</span>
                    <span class="badge ${cfg.badge}">${cfg.icon} ${cfg.label}</span>
                  </div>
                  <div style="font-size:0.8rem;color:var(--muted)">${formatDate(o.created_at)}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:1.3rem;font-weight:900;color:var(--brand)">${formatPrice(o.total_price)}</div>
                  <div style="font-size:0.78rem;color:var(--muted)">${o.items.length} item${o.items.length!==1?'s':''}</div>
                </div>
              </div>
              <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
                <div style="display:flex;gap:0.4rem;flex-wrap:wrap">
                  ${o.items.slice(0,3).map(i => `<span class="badge badge-gray">×${i.quantity} Item #${i.food_item_id}</span>`).join('')}
                  ${o.items.length > 3 ? `<span class="badge badge-gray">+${o.items.length-3} more</span>` : ''}
                </div>
                <button class="btn btn-ghost btn-sm view-btn" data-id="${o.id}">View Details →</button>
              </div>
            </div>`;
        }).join('');

        list.querySelectorAll('.view-btn').forEach(btn => {
          btn.addEventListener('click', (e) => { e.stopPropagation(); openModal(+btn.dataset.id, orders); });
        });
        list.querySelectorAll('[data-id]').forEach(card => {
          card.addEventListener('click', () => openModal(+card.dataset.id, orders));
        });
      } catch (err) { showToast(err.message, 'error'); }
    }

    function openModal(id, orders) {
      const o = orders.find(x => x.id === id);
      if (!o) return;
      const cfg = statusConfig[o.status] || statusConfig.pending;
      document.getElementById('modal-title').textContent = `Order #${o.id}`;
      document.getElementById('modal-body').innerHTML = `
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1.25rem">
          <span class="badge ${cfg.badge}" style="font-size:0.8rem">${cfg.icon} ${cfg.label}</span>
          <span style="font-size:0.8rem;color:var(--muted)">${formatDate(o.created_at)}</span>
        </div>
        ${buildTimeline(cfg.steps)}
        <div style="margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--border)">
          <div style="font-weight:700;margin-bottom:0.75rem">Items</div>
          ${o.items.map(i => `
            <div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.875rem">
              <span>Item #${i.food_item_id} <span style="color:var(--muted)">× ${i.quantity}</span></span>
              <span style="font-weight:600">${formatPrice(i.unit_price * i.quantity)}</span>
            </div>`).join('')}
          <div style="display:flex;justify-content:space-between;padding:0.75rem 0;font-weight:800;font-size:1rem">
            <span>Total</span><span style="color:var(--brand)">${formatPrice(o.total_price)}</span>
          </div>
        </div>`;
      document.getElementById('order-modal').classList.add('open');
    }

    document.getElementById('close-modal').addEventListener('click', () => document.getElementById('order-modal').classList.remove('open'));
    document.getElementById('order-modal').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

    loadOrders();
  </script>
</body>
</html>
